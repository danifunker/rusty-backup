# Cross-compile pins used by `cross build` in the MiSTer CI job
# (.github/workflows/release.yml -> build-rb-cli-mini-armv7).
#
# The MiSTer FPGA ships an Intel Cyclone V SoC (Cortex-A9, 32-bit ARM v7
# hardfloat) running a Buildroot-based glibc rootfs. The libchdman-rs
# prebuilt for `armv7-unknown-linux-gnueabihf` is being produced upstream
# against Ubuntu 20.04's glibc 2.31; we match that baseline here so the
# resulting rb-cli binary links cleanly against the same glibc symbols
# the MiSTer Buildroot rootfs exports.
#
# `cross` v0.2.5's image is the last one based on Ubuntu 20.04 — pinning
# to that tag keeps the toolchain stable across `cross` version bumps and
# avoids accidentally picking up an Ubuntu-22-based image that produces
# glibc-2.35-only binaries.
[target.armv7-unknown-linux-gnueabihf]
image = "ghcr.io/cross-rs/armv7-unknown-linux-gnueabihf:0.2.5"

# Forward libchdman-rs's build-script env vars into the container so the
# prebuilt fetcher can be steered from CI:
#   - XDG_CACHE_HOME — points at /tmp so the cache dir resolves to a path
#     the container user can write to (cross's HOME mount is read-only).
#   - LIBCHDMAN_GLIBC — usually unset; the build script auto-picks 2.31 for
#     armv7. Passed through anyway so a future "pin to glibc X" override
#     works without touching this file.
#   - LIBCHDMAN_PREBUILT_FALLBACK / _FORCE_SOURCE — escape hatches if the
#     prebuilt fetch fails or upstream temporarily lacks an asset; the
#     desktop release ships fine without us editing the workflow.
#   - LIBCHDMAN_PREBUILT_LOCAL_ARCHIVE — lets the workflow stage the .a
#     archive on the host (avoiding the per-build download) and hand it in.
[target.armv7-unknown-linux-gnueabihf.env]
passthrough = [
    "XDG_CACHE_HOME",
    "LIBCHDMAN_GLIBC",
    "LIBCHDMAN_PREBUILT_FALLBACK",
    "LIBCHDMAN_FORCE_SOURCE",
    "LIBCHDMAN_PREBUILT_LOCAL_ARCHIVE",
]
