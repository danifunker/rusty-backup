# mTCP configuration for the cb-dos backup box.
# PACKETINT must match the software interrupt your packet driver was loaded on
# (0x60 is the convention used by \NET\NET.BAT and DRIVERS.TXT).
PACKETINT 0x60
HOSTNAME crusty

# DHCP.EXE fills in the lines below automatically when it gets a lease, so you
# normally don't edit them. For a STATIC address instead of DHCP, comment out
# the DHCP step in NET.BAT and uncomment + edit these:
# IPADDR 192.168.1.50
# NETMASK 255.255.255.0
# GATEWAY 192.168.1.1
# NAMESERVER 192.168.1.1
