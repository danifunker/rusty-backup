# WATT-32 config for cb-dos networked backup.
#
# crustybk's `backup rb://host[:port]/name` links the WATT-32 TCP/IP stack and
# calls sock_init(), which reads this file. Ships at the floppy/CD root so it is
# found next to CRUSTYBK.EXE.
#
# BEFORE running a networked backup, load your NIC's packet driver on soft
# interrupt 60h (see \NET\DRIVERS\DRIVERS.TXT for the driver + args for your
# card), e.g.:  \NET\DRIVERS\NE2000 0x60 3 0x300
#
# Default: pull an IP over DHCP. For a fixed address instead, comment out the
# my_ip=dhcp line and uncomment + edit the static block below.
my_ip = dhcp

# Static configuration (uncomment and edit, and comment out my_ip=dhcp above):
# my_ip      = 192.168.1.50
# netmask    = 255.255.255.0
# gateway    = 192.168.1.1
# nameserver = 192.168.1.1
