name: Release

on:
  push:
    paths-ignore:
      - "*.md"
      - "docs/**"
  workflow_dispatch:
    # Manual "Run workflow" switches (this folds in the old standalone
    # appliance-media.yml — one pipeline, no drift). On a plain push these
    # inputs are unset: push always builds the desktop + cb-dos set, and a push
    # to main/master also builds the slow appliance (feature-branch pushes skip
    # it). A manual run can trim the build down to just the media you're
    # iterating on.
    inputs:
      desktop:
        description: "Build the desktop apps + CLIs + MiSTer binary"
        type: boolean
        default: true
      appliance:
        description: "Linux appliance CPU floor (Buildroot ISO/PXE/floppy)"
        type: choice
        options: [none, i586, i686, both]
        default: both
      cbdos:
        description: "Build cb-dos media (FreeDOS floppy + CD)"
        type: boolean
        default: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  generate-version:
    name: Generate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Generate version from date
        id: version
        run: |
          VERSION=$(date -u +"%Y-%m-%d-%H-%M")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

  build-windows:
    name: Build Windows
    # Skipped only when a manual run unticks "desktop"; every push builds it.
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.desktop }}
    needs: generate-version
    runs-on: windows-latest
    # Bake the release version for every cargo invocation in the job (Test and
    # Build alike). build.rs reads RELEASE_VERSION into APP_VERSION; if only the
    # Build step set it, the earlier `cargo test` would bake the 0.1.0 fallback
    # and (now that build.rs reruns on RELEASE_VERSION changes) force a needless
    # recompile in Build. Setting it job-wide keeps APP_VERSION consistent.
    env:
      RELEASE_VERSION: ${{ needs.generate-version.outputs.version }}
    strategy:
      # Run both arches to completion — don't let a 32-bit failure cancel the
      # x64 leg (we want to see both results when diagnosing arch-specific bugs).
      fail-fast: false
      matrix:
        include:
          - target: i686-pc-windows-msvc
            arch: x86
          - target: x86_64-pc-windows-msvc
            arch: x64
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      # Tests run upfront on the runner (i686 32-bit tests execute fine on the
      # x64 Windows runner). Failure fails the job and blocks the release.
      #
      # The 32-bit (i686) target has a ~2 GiB user address space. Some tests
      # materialize large in-memory images (e.g. the 512 MiB XFS fixture, which
      # is leaked once as a shared static, plus a writable per-test copy), so
      # running the test binary multi-threaded stacks several 512 MiB+ buffers
      # concurrently and aborts with "memory allocation of 536870912 bytes
      # failed". Serialize the i686 test binary so only one heavy test's
      # working set is live at a time; x64 has the address space to run in
      # parallel.
      - name: Test (i686, single-threaded)
        if: matrix.arch == 'x86'
        env:
          RUST_TEST_THREADS: 1
        run: cargo test --release --target ${{ matrix.target }}

      - name: Test
        if: matrix.arch != 'x86'
        run: cargo test --release --target ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ -f "../../../assets/icons/icon.ico" ]; then
            7z a ../../../Rusty-Backup-windows-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.zip rusty-backup.exe ../../../assets/icons/icon.ico
          else
            7z a ../../../Rusty-Backup-windows-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.zip rusty-backup.exe
          fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Rusty-Backup-windows-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}
          path: Rusty-Backup-windows-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.zip

      - name: Stage CLI binary
        shell: bash
        run: |
          # Zip the CLI so the download extracts to a plainly-named rb-cli.exe
          # (consistent with the macOS .zip / Linux .tar.gz).
          cd "target/${{ matrix.target }}/release"
          7z a "../../../rb-cli-windows-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.zip" rb-cli.exe

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: rb-cli-windows-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}
          path: rb-cli-windows-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.zip

      # Per-user Inno Setup installer (Setup.exe). Installs to %LocalAppData%
      # so the in-app self-updater can replace the running exe without admin.
      # Source dir has both rusty-backup.exe and rb-cli.exe from the Build step.
      # See installer/rusty-backup.iss + docs/windows_self_update.md.
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }
          $version = "${{ needs.generate-version.outputs.version }}"
          $src = "$env:GITHUB_WORKSPACE\target\${{ matrix.target }}\release"
          $assets = "$env:GITHUB_WORKSPACE\assets\icons"
          $base = "Rusty-Backup-Setup-windows-${{ matrix.arch }}-$version"
          & $iscc "/DMyAppVersion=$version" "/DSourceDir=$src" "/DAssetsDir=$assets" "/F$base" installer\rusty-backup.iss
          if ($LASTEXITCODE -ne 0) { throw "iscc failed with exit code $LASTEXITCODE" }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: Rusty-Backup-Setup-windows-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}
          path: installer\Output\Rusty-Backup-Setup-windows-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.exe

  build-macos:
    name: Build macOS
    # Skipped only when a manual run unticks "desktop"; every push builds it.
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.desktop }}
    needs: generate-version
    # arm64 builds+tests on Apple-silicon; x64 builds+tests natively on a real
    # Intel runner (no Rosetta), so `cargo test` runs on each arch's hardware.
    runs-on: ${{ matrix.runs-on }}
    env:
      HAS_SIGNING_CERT: ${{ secrets.MACOS_CERTIFICATE != '' }}
      # See build-windows: keep APP_VERSION consistent across Test and Build.
      RELEASE_VERSION: ${{ needs.generate-version.outputs.version }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
            runs-on: macos-latest
          - target: x86_64-apple-darwin
            arch: x64
            runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      # Tests run upfront on this leg's native hardware. Failure fails the job,
      # which blocks the release (the release job needs every build job).
      # --release shares compilation with the Build step below.
      - name: Test
        run: cargo test --release --target ${{ matrix.target }}

      - name: Build
        run: |
          # Build main app
          cargo build --release --target ${{ matrix.target }}
      
      - name: Import signing certificate
        if: ${{ env.HAS_SIGNING_CERT == 'true' }}
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PWD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          rm "$CERT_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Create macOS app bundle
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        run: |
          APP_NAME="Rusty Backup"
          BUNDLE_NAME="Rusty Backup.app"
          VERSION="${{ needs.generate-version.outputs.version }}"

          # Create app bundle structure
          mkdir -p "${BUNDLE_NAME}/Contents/MacOS"
          mkdir -p "${BUNDLE_NAME}/Contents/Resources"

          # Copy main binary
          cp "target/${{ matrix.target }}/release/rusty-backup" "${BUNDLE_NAME}/Contents/MacOS/"
          chmod +x "${BUNDLE_NAME}/Contents/MacOS/rusty-backup"

          # Copy icon if available
          if [ -f "assets/icons/icon.icns" ]; then
            cp "assets/icons/icon.icns" "${BUNDLE_NAME}/Contents/Resources/AppIcon.icns"
          fi

          # Create Info.plist
          cat > "${BUNDLE_NAME}/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>${APP_NAME}</string>
              <key>CFBundleDisplayName</key>
              <string>${APP_NAME}</string>
              <key>CFBundleIdentifier</key>
              <string>io.github.dani.rusty-backup</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleExecutable</key>
              <string>rusty-backup</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon.icns</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>LSMinimumSystemVersion</key>
              <string>10.13</string>
          </dict>
          </plist>
          EOF

          # Code sign: use Developer ID if available, otherwise ad-hoc
          if [ -n "$MACOS_CERTIFICATE" ] && [ -n "$MACOS_TEAM_ID" ]; then
            # Find the exact identity name from the imported certificate
            IDENTITY=$(security find-identity -v -p codesigning "$RUNNER_TEMP/app-signing.keychain-db" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "Signing with identity: $IDENTITY"
            codesign --force --options runtime --sign "$IDENTITY" "${BUNDLE_NAME}"
          else
            echo "No signing certificate found, using ad-hoc signature..."
            codesign --force --deep --sign - "${BUNDLE_NAME}"
          fi

          # Free disk before building the DMG. The intel runner
          # (macos-26-intel) has tight disk, and hdiutil needs room to stage a
          # copy of the .app plus the compressed image; the x64 leg was failing
          # here with "hdiutil: create failed - No space left on device".
          #
          # NOTE: a full `cargo clean` would delete target/.../release/rb-cli,
          # which the later "Sign CLI binary" / "Package CLI for notarization"
          # steps still need. So drop only the build intermediates (the multi-GB
          # bulk) and keep both final binaries: rusty-backup is already copied
          # into the .app above, and rb-cli stays at the release/ root.
          echo "== Disk before cleanup =="; df -h .
          du -sh "target/${{ matrix.target }}/release" 2>/dev/null || true
          # Only the intel runner is disk-constrained. Guard the cleanup to it so
          # arm64's build cache (which works fine) is left intact — deleting deps/
          # would otherwise strip intermediates from the saved cache and force a
          # full rebuild next run.
          if [ "${{ matrix.arch }}" = "x64" ]; then
            rm -rf \
              "target/${{ matrix.target }}/release/deps" \
              "target/${{ matrix.target }}/release/build" \
              "target/${{ matrix.target }}/release/incremental" \
              "target/${{ matrix.target }}/release/.fingerprint"
            echo "== Disk after cleanup =="; df -h .
          fi

          # Create DMG (stage the app alongside an /Applications symlink so
          # users can drag-install)
          DMG_STAGING="dmg-staging"
          rm -rf "${DMG_STAGING}"
          mkdir -p "${DMG_STAGING}"
          cp -R "${BUNDLE_NAME}" "${DMG_STAGING}/"
          ln -s /Applications "${DMG_STAGING}/Applications"
          hdiutil create -volname "${APP_NAME}" -srcfolder "${DMG_STAGING}" -ov -format UDZO "Rusty-Backup-macos-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.dmg"
          echo "== Disk after DMG =="; df -h .

          # Sign the DMG as well if certificate is available
          if [ -n "$MACOS_CERTIFICATE" ] && [ -n "$MACOS_TEAM_ID" ]; then
            codesign --force --sign "$IDENTITY" "Rusty-Backup-macos-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.dmg"
          fi

      - name: Notarize DMG
        if: ${{ env.HAS_SIGNING_CERT == 'true' }}
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_NOTARIZE_APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          MACOS_NOTARIZE_PASSWORD: ${{ secrets.MACOS_NOTARIZE_PASSWORD }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        run: |
          DMG_FILE="Rusty-Backup-macos-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.dmg"

          echo "Submitting for notarization..."
          xcrun notarytool submit "$DMG_FILE" \
            --apple-id "$MACOS_NOTARIZE_APPLE_ID" \
            --password "$MACOS_NOTARIZE_PASSWORD" \
            --team-id "$MACOS_TEAM_ID" \
            --wait

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG_FILE"

      - name: Sign CLI binary
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        run: |
          CLI_BIN="target/${{ matrix.target }}/release/rb-cli"
          if [ -n "$MACOS_CERTIFICATE" ] && [ -n "$MACOS_TEAM_ID" ]; then
            IDENTITY=$(security find-identity -v -p codesigning "$RUNNER_TEMP/app-signing.keychain-db" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "Signing CLI with identity: $IDENTITY"
            codesign --force --options runtime --timestamp --sign "$IDENTITY" "$CLI_BIN"
          else
            echo "No signing certificate found, using ad-hoc signature..."
            codesign --force --sign - "$CLI_BIN"
          fi

      - name: Package CLI for notarization
        run: |
          ZIP_NAME="rb-cli-macos-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.zip"
          # ditto produces the zip layout notarytool / Gatekeeper expect for
          # loose binaries; plain `zip` works too but ditto is the canonical
          # tool on macOS. No --keepParent: the archive root is the bare
          # rb-cli binary, so it extracts to ./rb-cli (not ./release/rb-cli).
          ditto -c -k "target/${{ matrix.target }}/release/rb-cli" "$ZIP_NAME"

      - name: Notarize CLI
        if: ${{ env.HAS_SIGNING_CERT == 'true' }}
        env:
          MACOS_NOTARIZE_APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          MACOS_NOTARIZE_PASSWORD: ${{ secrets.MACOS_NOTARIZE_PASSWORD }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        run: |
          ZIP_NAME="rb-cli-macos-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.zip"
          echo "Submitting CLI zip for notarization..."
          xcrun notarytool submit "$ZIP_NAME" \
            --apple-id "$MACOS_NOTARIZE_APPLE_ID" \
            --password "$MACOS_NOTARIZE_PASSWORD" \
            --team-id "$MACOS_TEAM_ID" \
            --wait
          # Stapler can't attach a ticket to a bare binary inside a zip;
          # Gatekeeper performs an online check on first launch instead.

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Rusty-Backup-macos-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}
          path: Rusty-Backup-macos-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.dmg

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: rb-cli-macos-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}
          path: rb-cli-macos-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.zip

  build-linux-appimage:
    name: Build Linux AppImage (Anylinux)
    # Skipped only when a manual run unticks "desktop"; every push builds it.
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.desktop }}
    needs: generate-version
    runs-on: ${{ matrix.runs-on }}
    container: ghcr.io/pkgforge-dev/archlinux:latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x64
            sharun_arch: x86_64
            runs-on: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            sharun_arch: aarch64
            runs-on: ubuntu-24.04-arm
    env:
      # Pinned to commit 2affcd6 of pkgforge-dev/Anylinux-AppImages
      # (latest commit touching quick-sharun.sh / get-debloated-pkgs.sh)
      ANYLINUX_REF: 2affcd69e3b3fccab4507dbdbaed5d1a04bedfa9
      # Pinned appimagetool release; quick-sharun honours APPIMAGETOOL_LINK.
      APPIMAGETOOL_VERSION: "0.3.0"
      # See build-windows: keep APP_VERSION consistent across Test and Build.
      RELEASE_VERSION: ${{ needs.generate-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Arch build prerequisites
        run: |
          pacman -Syu --noconfirm \
            base-devel \
            cmake \
            rust \
            gtk3 \
            alsa-lib \
            openssl \
            pkgconf \
            wget \
            curl \
            git \
            xorg-server-xvfb \
            strace \
            dbus \
            file \
            patchelf \
            desktop-file-utils \
            shared-mime-info \
            zsync \
            libxcb \
            libxcursor \
            libxi \
            libxkbcommon \
            libxkbcommon-x11 \
            libxrandr \
            libxtst \
            mesa \
            vulkan-icd-loader

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ matrix.arch }}-anylinux-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.arch }}-anylinux-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-anylinux-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      # Tests run upfront in the Arch build container (native target). Failure
      # fails the job and blocks the release.
      - name: Test
        run: cargo test --release --target ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install debloated runtime packages
        run: |
          wget --retry-connrefused --tries=30 \
            "https://raw.githubusercontent.com/pkgforge-dev/Anylinux-AppImages/${ANYLINUX_REF}/useful-tools/get-debloated-pkgs.sh" \
            -O ./get-debloated-pkgs.sh
          chmod +x ./get-debloated-pkgs.sh
          ./get-debloated-pkgs.sh --add-common --add-mesa --prefer-nano

      - name: Stage AppDir inputs
        run: |
          VERSION="${{ needs.generate-version.outputs.version }}"
          # quick-sharun reads ICON and DESKTOP from absolute paths; stage them
          # under /usr so it picks them up as if they were system-installed.
          install -Dm755 target/${{ matrix.target }}/release/rusty-backup /usr/bin/rusty-backup
          install -Dm644 assets/icons/icon-256.png /usr/share/icons/hicolor/256x256/apps/rusty-backup.png
          install -d /usr/share/applications
          cat > /usr/share/applications/rusty-backup.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=Rusty Backup
          Comment=Backup and restore vintage computer hard disk images
          Exec=rusty-backup
          Icon=rusty-backup
          Categories=Utility;System;
          Terminal=false
          StartupNotify=true
          X-AppImage-Version=${VERSION}
          EOF

      - name: Bundle with quick-sharun
        run: |
          VERSION="${{ needs.generate-version.outputs.version }}"
          OUT="Rusty-Backup-linux-${{ matrix.arch }}-${VERSION}.AppImage"

          wget --retry-connrefused --tries=30 \
            "https://raw.githubusercontent.com/pkgforge-dev/Anylinux-AppImages/${ANYLINUX_REF}/useful-tools/quick-sharun.sh" \
            -O ./quick-sharun
          chmod +x ./quick-sharun

          export ICON=/usr/share/icons/hicolor/256x256/apps/rusty-backup.png
          export DESKTOP=/usr/share/applications/rusty-backup.desktop
          export OUTPATH="$PWD/dist"
          export OUTNAME="$OUT"
          export VERSION
          # Pin appimagetool (quick-sharun downloads via this URL).
          export APPIMAGETOOL_LINK="https://github.com/pkgforge-dev/appimagetool/releases/download/${APPIMAGETOOL_VERSION}/appimagetool-${{ matrix.sharun_arch }}-linux"
          # GITHUB_REPOSITORY is set by Actions; appimagetool auto-emits zsync.

          mkdir -p "$OUTPATH"
          ./quick-sharun /usr/bin/rusty-backup
          ./quick-sharun --make-appimage

          ls -lh "$OUTPATH"

      - name: Smoke-test AppImage elevation path
        # Catches the regression where relaunch_with_elevation() hands pkexec
        # the user-private FUSE-mounted binary (/tmp/.mount_*/...) instead of
        # the .AppImage file itself — pkexec then fails with "Permission
        # denied" before the GUI loads. We install a fake pkexec that records
        # its argv, run the AppImage as a non-root user, and assert pkexec
        # was invoked with the .AppImage path (not a FUSE mount path).
        # arm64 jobs run on Ubuntu hosts but inside the same Arch container.
        if: matrix.arch == 'x64'
        run: |
          VERSION="${{ needs.generate-version.outputs.version }}"
          APPIMAGE_PATH="$PWD/dist/Rusty-Backup-linux-${{ matrix.arch }}-${VERSION}.AppImage"
          test -x "$APPIMAGE_PATH"

          # Fake pkexec: log argv to a world-readable file, exit non-zero so
          # the AppImage falls through to running unprivileged.
          LOG=/tmp/pkexec-argv.log
          : > "$LOG" && chmod 666 "$LOG"
          cat > /usr/local/bin/pkexec <<EOF
          #!/bin/sh
          printf '%s\n' "\$*" >> $LOG
          exit 1
          EOF
          chmod 755 /usr/local/bin/pkexec

          # Run AppImage as an unprivileged user so the elevation path triggers.
          useradd -m -s /bin/bash smoketest || true
          chown smoketest:smoketest "$APPIMAGE_PATH"
          runuser -u smoketest -- timeout 10 "$APPIMAGE_PATH" > smoke.out 2>&1 || true

          echo "--- AppImage output ---"
          cat smoke.out || true
          echo "--- pkexec argv log ---"
          cat "$LOG" || true

          if ! grep -qE '\.AppImage( |$)' "$LOG"; then
            echo "FAIL: pkexec was not invoked with the .AppImage path"
            echo "Likely regression: relaunch_with_elevation() is using current_exe() instead of \$APPIMAGE"
            exit 1
          fi
          if grep -qE '/tmp/\.mount_[^ ]+/(usr/)?bin/rusty-backup' "$LOG"; then
            echo "FAIL: pkexec received a FUSE-mounted path — this is the original bug"
            exit 1
          fi
          echo "PASS: pkexec received the .AppImage path"

          rm -f /usr/local/bin/pkexec

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Rusty-Backup-linux-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}-appimage
          path: |
            dist/Rusty-Backup-linux-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.AppImage
            dist/Rusty-Backup-linux-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.AppImage.zsync

  build-linux-packages:
    name: Build Linux Packages
    # Skipped only when a manual run unticks "desktop"; every push builds it.
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.desktop }}
    needs: generate-version
    runs-on: ${{ matrix.runs-on }}
    # See build-windows: keep APP_VERSION consistent across Test and Build.
    env:
      RELEASE_VERSION: ${{ needs.generate-version.outputs.version }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x64
            runs-on: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (GitHub-hosted only)
        if: ${{ !contains(matrix.runs-on, 'self-hosted') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgtk-3-dev libasound2-dev libssl-dev pkg-config dpkg-dev liblzma-dev rpm libarchive-tools zstd

      - name: Install cargo packaging tools
        # `cargo install` from crates.io is flaky on the hosted runners
        # (especially arm64): a transient download/build failure used to be
        # swallowed by `|| true`, so the step went green while the binary was
        # missing — then "Build RPM package" died with `no such command:
        # generate-rpm`. Retry each install up to 3 times and fail loudly if a
        # tool is genuinely unavailable, so the error surfaces here, not later.
        run: |
          install_tool() {
            local crate="$1"
            if command -v "$crate" >/dev/null 2>&1; then
              echo "$crate already installed; skipping"
              return 0
            fi
            for attempt in 1 2 3; do
              echo "::group::Installing $crate (attempt $attempt/3)"
              if cargo install "$crate"; then
                echo "::endgroup::"
                return 0
              fi
              echo "::endgroup::"
              echo "Install of $crate failed (attempt $attempt/3)"
              sleep 15
            done
            echo "::error::failed to install $crate after 3 attempts"
            return 1
          }
          install_tool cargo-deb
          install_tool cargo-generate-rpm
          install_tool cargo-aur

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      # Tests run upfront on this leg's native runner (x64 + arm64). Failure
      # fails the job and blocks the release.
      - name: Test
        run: cargo test --release --target ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build Debian package
        run: |
          cargo deb --target ${{ matrix.target }} --no-build
          mv target/${{ matrix.target }}/debian/*.deb Rusty-Backup-linux-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.deb

      - name: Build RPM package
        run: |
          cargo generate-rpm --target ${{ matrix.target }}
          mv target/${{ matrix.target }}/generate-rpm/*.rpm Rusty-Backup-linux-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.rpm

      - name: Build Arch package
        run: |
          cargo aur
          # cargo-aur generates PKGBUILD, build with makepkg equivalent
          mkdir -p arch-build
          cp target/release/rusty-backup arch-build/
          cp rusty-backup.desktop arch-build/
          cp -r assets arch-build/
          cd arch-build
          
          # Create a simple package structure
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/icons/hicolor/{16x16,32x32,48x48,64x64,128x128,256x256}/apps
          
          cp rusty-backup pkg/usr/bin/
          chmod 755 pkg/usr/bin/rusty-backup
          cp rusty-backup.desktop pkg/usr/share/applications/
          cp assets/icons/icon-16.png pkg/usr/share/icons/hicolor/16x16/apps/rusty-backup.png
          cp assets/icons/icon-32.png pkg/usr/share/icons/hicolor/32x32/apps/rusty-backup.png
          cp assets/icons/icon-48.png pkg/usr/share/icons/hicolor/48x48/apps/rusty-backup.png
          cp assets/icons/icon-64.png pkg/usr/share/icons/hicolor/64x64/apps/rusty-backup.png
          cp assets/icons/icon-128.png pkg/usr/share/icons/hicolor/128x128/apps/rusty-backup.png
          cp assets/icons/icon-256.png pkg/usr/share/icons/hicolor/256x256/apps/rusty-backup.png
          
          # Create package with tar and zstd
          cd pkg
          tar -czf ../../Rusty-Backup-linux-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.pkg.tar.zst *

      - name: Upload Debian package
        uses: actions/upload-artifact@v7
        with:
          name: Rusty-Backup-linux-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}-deb
          path: Rusty-Backup-linux-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.deb

      - name: Upload RPM package
        uses: actions/upload-artifact@v7
        with:
          name: Rusty-Backup-linux-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}-rpm
          path: Rusty-Backup-linux-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.rpm

      - name: Upload Arch package
        uses: actions/upload-artifact@v7
        with:
          name: Rusty-Backup-linux-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}-arch
          path: Rusty-Backup-linux-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.pkg.tar.zst

      - name: Package CLI
        run: |
          TGZ="rb-cli-linux-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$TGZ" rb-cli

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: rb-cli-linux-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}
          path: rb-cli-linux-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.tar.gz

  # MiSTer-specific build of `rb-cli` for the FPGA's Intel Cyclone V / Cortex-A9
  # / Buildroot rootfs (`armv7-unknown-linux-gnueabihf`, glibc 2.31 baseline).
  # Cross-compiled with the GUI and optical features off, but CHD ON — the
  # upstream `libchdman-rs` armv7 prebuilt ships against Ubuntu 20.04 glibc,
  # which Cross.toml pins this job to as well so symbols line up.
  #
  # The `release` job lists this build in its `needs:` so the workflow waits
  # for the tarball to upload before publishing, and the upload glob picks it
  # up alongside the desktop artifacts. `continue-on-error: true` below makes
  # a transient cross-compile failure non-fatal — the release still proceeds,
  # just without the MiSTer artifact for that one run.
  build-rb-cli-mini-armv7:
    name: Build rb-cli-mini (armv7 MiSTer)
    # Skipped only when a manual run unticks "desktop"; every push builds it.
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.desktop }}
    needs: generate-version
    runs-on: ubuntu-latest
    # Don't fail the whole workflow if the cross-compile breaks. Combined
    # with the release job's `needs:` entry above, this still gates the
    # release on the artifact existing — but a failure here lets the desktop
    # release proceed without the MiSTer tarball rather than blocking it.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-unknown-linux-gnueabihf

      - name: Install armv7 binutils (host-side strip + objdump)
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-arm-linux-gnueabihf file

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-armv7-mister-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build rb-cli-mini for MiSTer armv7 (CHD + optical on, GUI off)
        env:
          RELEASE_VERSION: ${{ needs.generate-version.outputs.version }}
          # libchdman-rs's build.rs falls back to $HOME/.cache/libchdman-rs
          # for the prebuilt-archive cache; inside the cross container that
          # path is on a read-only mount and the build script panics with
          # "create cache dir: Permission denied". /tmp is a writable tmpfs
          # in the container, so steering XDG_CACHE_HOME there gives the
          # fetcher somewhere to land the .a archive. Passthrough for this
          # var is declared in Cross.toml.
          XDG_CACHE_HOME: /tmp/libchdman-cache
        run: |
          # Cross.toml at the repo root pins the Docker image to cross-rs
          # v0.2.5 (Ubuntu 20.04 base) so this binary links against the same
          # glibc baseline as MiSTer's Buildroot rootfs and the upstream
          # libchdman-rs armv7 prebuilt.
          # `remote` = the rb-cli serve daemon + rb:// (pure std::net + serde_json,
          # no C / no extra crate), so the MiSTer can host its images on the LAN.
          # `optical` = CD/DVD ripping (`optical rip` / `drives` / `convert`).
          # cd-da-reader is cc+libc (an SG_IO shim, no system libcdio); opticaldiscs
          # (>=0.4.5) reuses the SAME libchdman-rs 0.288.5 prebuilt as `chd` (deduped
          # to one copy), which ships an armv7 build. Lets a device with a CD drive
          # (e.g. SuperStation One) rip discs.
          cross build \
            --bin rb-cli \
            --release \
            --target armv7-unknown-linux-gnueabihf \
            --no-default-features \
            --features chd,pure-zstd,remote,optical

      - name: Strip binary
        run: |
          arm-linux-gnueabihf-strip target/armv7-unknown-linux-gnueabihf/release/rb-cli

      - name: Verify ELF + report glibc linkage
        run: |
          set -e
          ELF=target/armv7-unknown-linux-gnueabihf/release/rb-cli
          file "$ELF"
          ls -lh "$ELF"
          arm-linux-gnueabihf-objdump -p "$ELF" | grep -E 'NEEDED|GLIBC_'

      - name: Package
        run: |
          # Ship the binary as `rb-cli-mini` inside the tarball so it lives
          # on the MiSTer SD card under a name that disambiguates it from
          # a desktop rb-cli copy. `--transform` rewrites the entry name
          # in the archive without touching the on-disk file, so all the
          # build/strip/objdump steps above can keep referring to `rb-cli`.
          # Completion-script generation reads the bin name from argv[0]
          # at runtime, so `rb-cli-mini install-completions` writes its
          # script to `bash-completion/completions/rb-cli-mini` and bash
          # finds it via the standard filename-based lookup.
          # Also bundle the MiSTer daemon shim + installer (mister/) so a user
          # can drop the daemon onto the SD card with one script. The transform
          # only rewrites an entry named exactly `rb-cli`, so the .sh files keep
          # their names. install.sh copies rb-cli-mini -> Scripts/rb-cli and
          # rb-daemon.sh -> Scripts/rb-daemon.sh (the only menu entry).
          TGZ="rb-cli-mini-armv7-linux-${{ needs.generate-version.outputs.version }}.tar.gz"
          tar --transform 's,^rb-cli$,rb-cli-mini,' \
              -czf "$TGZ" \
              -C target/armv7-unknown-linux-gnueabihf/release rb-cli \
              -C "$GITHUB_WORKSPACE/mister" rb-daemon.sh install.sh
          # Sanity: the archive should hold `rb-cli-mini` (not `rb-cli`) plus the
          # MiSTer scripts.
          tar -tzf "$TGZ"
          ls -lh "$TGZ"

      - name: Build MiSTer Downloader database (custom-databases.md)
        env:
          VER: ${{ needs.generate-version.outputs.version }}
        run: |
          # MiSTer Downloader (Downloader_MiSTer) consumes a custom-database JSON
          # that lists individual files -> SD paths with an md5 + size each; it
          # does NOT unpack tarballs. So alongside the .tar.gz we publish the raw
          # binary + daemon shim as standalone, UN-versioned release assets plus a
          # `*.json.zip` database that points at them through GitHub's stable
          # `releases/latest/download/<asset>` alias. Stable names + the `latest`
          # alias = one fixed db_url the user adds once; every later release's
          # fresh hashes line up because the user always fetches the newest DB.
          set -e
          mkdir -p dist-mister
          cp target/armv7-unknown-linux-gnueabihf/release/rb-cli dist-mister/rb-cli-mini-armv7
          cp "$GITHUB_WORKSPACE/mister/rb-daemon.sh"            dist-mister/rb-daemon.sh

          BIN_MD5=$(md5sum dist-mister/rb-cli-mini-armv7 | cut -d' ' -f1)
          BIN_SIZE=$(stat -c%s dist-mister/rb-cli-mini-armv7)
          SH_MD5=$(md5sum dist-mister/rb-daemon.sh | cut -d' ' -f1)
          SH_SIZE=$(stat -c%s dist-mister/rb-daemon.sh)
          TS=$(date +%s)
          BASE="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/latest/download"

          # db_id is permanent once published - changing it strands old files on
          # users' cards (Downloader can no longer clean them up). Keep it forever.
          cat > dist-mister/rusty-backup.json <<JSON
          {
            "v": 1,
            "db_id": "danifunker/rusty-backup",
            "timestamp": ${TS},
            "files": {
              "Scripts/rb-cli": {
                "hash": "${BIN_MD5}",
                "size": ${BIN_SIZE},
                "url": "${BASE}/rb-cli-mini-armv7",
                "overwrite": true,
                "reboot": false
              },
              "Scripts/rb-daemon.sh": {
                "hash": "${SH_MD5}",
                "size": ${SH_SIZE},
                "url": "${BASE}/rb-daemon.sh",
                "overwrite": true,
                "reboot": false
              }
            },
            "folders": {
              "Scripts/": {}
            }
          }
          JSON

          # Downloader accepts a zipped DB as long as the name ends `.json.zip`;
          # the JSON filename inside the zip is free-form.
          ( cd dist-mister && zip -q rusty-backup.json.zip rusty-backup.json )

          echo "----- generated MiSTer Downloader database -----"
          cat dist-mister/rusty-backup.json
          ls -lh dist-mister/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rb-cli-mini-armv7-linux-${{ needs.generate-version.outputs.version }}
          # The versioned tarball is the human download; the un-versioned
          # dist-mister/ files are what the Downloader database references via the
          # `releases/latest/download/` alias. The release job flattens both out.
          path: |
            rb-cli-mini-armv7-linux-${{ needs.generate-version.outputs.version }}.tar.gz
            dist-mister/rb-cli-mini-armv7
            dist-mister/rb-daemon.sh
            dist-mister/rusty-backup.json.zip

  # Slim, pure-Rust `rb-cli` for additional CPU architectures that have a Rust
  # Tier-2 std + a prebuilt `rust-std` + a Debian GCC cross-toolchain, but NO
  # desktop GUI story: the `gui` feature pulls eframe/winit and `chd`/`optical`
  # pull libchdman-rs, whose prebuilt archive doesn't exist for these triples.
  # So we ship the headless CLI from the all-pure-Rust feature set
  # (`pure-zstd,remote`) — same shape as the i586/i486 appliance build, minus
  # CHD. There's zero C to cross-compile, so a plain `cargo build` plus the apt
  # GCC cross-linker is enough — no `cross`/Docker needed here. Big-endian
  # PowerPC is a first-class target: every on-disk struct goes through
  # `byteorder` with explicit endianness, so BE is just another build.
  build-rb-cli-extra-arch:
    name: Build rb-cli (${{ matrix.label }})
    # Skipped only when a manual run unticks "desktop"; every push builds it.
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.desktop }}
    needs: generate-version
    runs-on: ubuntu-latest
    # Non-fatal: a broken cross-compile must not hold up the desktop release
    # (the release job hard-requires only the four desktop builds). The release
    # still waits for this job via `needs:`, so a green build ships its tarball.
    continue-on-error: true
    strategy:
      # One arch failing must not cancel the others — we want every result.
      fail-fast: false
      matrix:
        include:
          - target: powerpc64-unknown-linux-gnu
            arch: ppc64
            label: Linux PowerPC 64-bit BE
            gnu_prefix: powerpc64-linux-gnu
            linker_env: CARGO_TARGET_POWERPC64_UNKNOWN_LINUX_GNU_LINKER
          - target: powerpc-unknown-linux-gnu
            arch: ppc32
            label: Linux PowerPC 32-bit BE
            gnu_prefix: powerpc-linux-gnu
            linker_env: CARGO_TARGET_POWERPC_UNKNOWN_LINUX_GNU_LINKER
          - target: riscv64gc-unknown-linux-gnu
            arch: riscv64
            label: Linux RISC-V 64-bit
            gnu_prefix: riscv64-linux-gnu
            linker_env: CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER
    env:
      RELEASE_VERSION: ${{ needs.generate-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install GCC cross-linker + binutils (host-side link + strip + objdump)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-${{ matrix.gnu_prefix }} binutils-${{ matrix.gnu_prefix }} file

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Point cargo at the cross-linker
        # `*-linux-gnu` glibc targets link through the matching GCC cross-driver.
        # The per-target env var leaves the committed .cargo/config.toml untouched.
        run: echo "${{ matrix.linker_env }}=${{ matrix.gnu_prefix }}-gcc" >> "$GITHUB_ENV"

      - name: Build rb-cli (pure-Rust slim — no GUI / CHD / optical)
        run: |
          cargo build \
            --release \
            --bin rb-cli \
            --no-default-features \
            --features pure-zstd,remote \
            --target ${{ matrix.target }}

      - name: Strip binary
        run: ${{ matrix.gnu_prefix }}-strip target/${{ matrix.target }}/release/rb-cli

      - name: Verify ELF + report arch / glibc linkage
        run: |
          set -e
          ELF=target/${{ matrix.target }}/release/rb-cli
          file "$ELF"
          ls -lh "$ELF"
          ${{ matrix.gnu_prefix }}-objdump -p "$ELF" | grep -E 'NEEDED|GLIBC_' || true

      - name: Package CLI
        run: |
          TGZ="rb-cli-linux-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$TGZ" rb-cli
          ls -lh "$TGZ"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: rb-cli-linux-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}
          path: rb-cli-linux-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.tar.gz

  # Full desktop app + `rb-cli` for Windows on ARM64 (aarch64-pc-windows-msvc),
  # cross-compiled on the x64 Windows runner (its Visual Studio carries the ARM64
  # MSVC libs). First-class GUI build: libchdman-rs 0.288.9 publishes an
  # aarch64-pc-windows-msvc prebuilt, so the `chd`/`optical` core links and the
  # app ships the same default feature set as the x64/x86 Windows builds.
  # Build-only (continue-on-error): an ARM64 exe can't execute on the x64 runner,
  # so the test legs stay on the x64/x86 Windows jobs.
  build-windows-arm64:
    name: Build Windows ARM64 (GUI + rb-cli)
    # Skipped only when a manual run unticks "desktop"; every push builds it.
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.desktop }}
    needs: generate-version
    runs-on: windows-latest
    # Non-fatal, like the other CLI cross-builds — the release waits for it via
    # `needs:` but a failure here can't block the desktop downloads.
    continue-on-error: true
    env:
      RELEASE_VERSION: ${{ needs.generate-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-aarch64-pc-windows-msvc-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      # Default features (GUI + chd + optical + native-zstd/zlib + remote) — one
      # build produces both rusty-backup.exe and rb-cli.exe, like build-windows.
      - name: Build (GUI + rb-cli, default features)
        run: cargo build --release --target aarch64-pc-windows-msvc

      - name: Package app
        shell: bash
        run: |
          cd target/aarch64-pc-windows-msvc/release
          if [ -f "../../../assets/icons/icon.ico" ]; then
            7z a ../../../Rusty-Backup-windows-arm64-${{ needs.generate-version.outputs.version }}.zip rusty-backup.exe ../../../assets/icons/icon.ico
          else
            7z a ../../../Rusty-Backup-windows-arm64-${{ needs.generate-version.outputs.version }}.zip rusty-backup.exe
          fi

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: Rusty-Backup-windows-arm64-${{ needs.generate-version.outputs.version }}
          path: Rusty-Backup-windows-arm64-${{ needs.generate-version.outputs.version }}.zip

      - name: Stage CLI binary
        shell: bash
        run: |
          # Zip so the download extracts to a plainly-named rb-cli.exe, matching
          # the x64/x86 Windows CLI artifacts.
          cd "target/aarch64-pc-windows-msvc/release"
          7z a "../../../rb-cli-windows-arm64-${{ needs.generate-version.outputs.version }}.zip" rb-cli.exe

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: rb-cli-windows-arm64-${{ needs.generate-version.outputs.version }}
          path: rb-cli-windows-arm64-${{ needs.generate-version.outputs.version }}.zip

  # Full desktop GUI for Linux RISC-V 64 (riscv64gc-unknown-linux-gnu),
  # cross-compiled on x64. There is no GitHub-hosted riscv64 runner, so unlike
  # the x64/arm64 AppImage jobs this can't build/package natively: we cross-link
  # the default feature set (GUI + CHD + optical) against a riscv64 GTK/GL sysroot
  # pulled in via dpkg multiarch (ubuntu-ports), then ship a plain dynamically-
  # linked tarball — NOT a self-contained AppImage; it uses the user's system
  # GTK3 at runtime. libchdman-rs 0.288.9 publishes the riscv64gc prebuilt that
  # makes the CHD core link. continue-on-error: best-effort, can't block release.
  build-gui-linux-riscv64:
    name: Build Linux RISC-V 64 GUI (rusty-backup)
    # Skipped only when a manual run unticks "desktop"; every push builds it.
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.desktop }}
    needs: generate-version
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      RELEASE_VERSION: ${{ needs.generate-version.outputs.version }}
      # libchdman is C++; link through g++ so libstdc++ is pulled in.
      CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER: riscv64-linux-gnu-g++
      # cc-rs (cd-da-reader's C shim) — the riscv64gc triple doesn't auto-map to
      # the riscv64-linux-gnu-* cross tools, so point it at them explicitly.
      CC_riscv64gc_unknown_linux_gnu: riscv64-linux-gnu-gcc
      CXX_riscv64gc_unknown_linux_gnu: riscv64-linux-gnu-g++
      # gtk-sys/glib-sys (system-deps) must read the riscv64 multiarch .pc files
      # and accept a cross build.
      PKG_CONFIG_ALLOW_CROSS: "1"
      PKG_CONFIG_LIBDIR: /usr/lib/riscv64-linux-gnu/pkgconfig:/usr/share/pkgconfig
      PKG_CONFIG_SYSROOT_DIR: /
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv64gc-unknown-linux-gnu

      - name: Add riscv64 as a foreign dpkg architecture (ubuntu-ports)
        run: |
          set -euxo pipefail
          # riscv64 lives in ubuntu-ports, not the amd64 archive. Pin every
          # existing source to amd64 so `apt-get update` doesn't 404 trying to
          # fetch riscv64 indexes from archive.ubuntu.com / PPAs, then add one
          # riscv64-only ports source.
          sudo dpkg --add-architecture riscv64
          for f in /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] || continue
            grep -q '^Architectures:' "$f" || sudo sed -i '/^Types:/a Architectures: amd64' "$f"
          done
          for f in /etc/apt/sources.list /etc/apt/sources.list.d/*.list; do
            [ -f "$f" ] || continue
            sudo sed -i -E 's|^deb (http)|deb [arch=amd64] \1|; s|^deb-src (http)|deb-src [arch=amd64] \1|' "$f"
          done
          printf '%s\n' \
            'Types: deb' \
            'URIs: http://ports.ubuntu.com/ubuntu-ports' \
            'Suites: noble noble-updates noble-backports noble-security' \
            'Components: main universe' \
            'Architectures: riscv64' \
            'Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg' \
            | sudo tee /etc/apt/sources.list.d/riscv64-ports.sources >/dev/null
          sudo apt-get update

      - name: Install riscv64 cross toolchain + GTK/GL sysroot
        run: |
          set -euxo pipefail
          sudo apt-get install -y \
            g++-riscv64-linux-gnu binutils-riscv64-linux-gnu file \
            libgtk-3-dev:riscv64 libglib2.0-dev:riscv64 \
            libasound2-dev:riscv64 \
            libgl1-mesa-dev:riscv64 libegl1-mesa-dev:riscv64 \
            libxkbcommon-dev:riscv64 libxkbcommon-x11-dev:riscv64 \
            libx11-dev:riscv64 libxcb1-dev:riscv64 libxcursor-dev:riscv64 \
            libxi-dev:riscv64 libxrandr-dev:riscv64 libwayland-dev:riscv64

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-riscv64gc-gui-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (default features = GUI + CHD + optical + audio)
        run: cargo build --release --target riscv64gc-unknown-linux-gnu

      - name: Strip + verify ELF
        run: |
          set -e
          ELF=target/riscv64gc-unknown-linux-gnu/release/rusty-backup
          riscv64-linux-gnu-strip "$ELF"
          file "$ELF"
          ls -lh "$ELF"
          riscv64-linux-gnu-objdump -p "$ELF" | grep -E 'NEEDED|GLIBC_' || true

      - name: Package app
        run: |
          TGZ="Rusty-Backup-linux-riscv64-${{ needs.generate-version.outputs.version }}.tar.gz"
          tar -C target/riscv64gc-unknown-linux-gnu/release -czf "$TGZ" rusty-backup
          ls -lh "$TGZ"

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: Rusty-Backup-linux-riscv64-${{ needs.generate-version.outputs.version }}
          path: Rusty-Backup-linux-riscv64-${{ needs.generate-version.outputs.version }}.tar.gz

  # Turn the `appliance` choice input into a JSON arch list for the matrix
  # below. A manual dispatch honours none / i586 / i686 / both. A push to
  # main/master builds both arches automatically (the full Buildroot build is
  # ~1 h, but main pushes are real releases and the job is continue-on-error,
  # so it can't hold up the desktop downloads). A push to any other branch
  # resolves to [] so feature-branch iteration stays fast.
  appliance-matrix:
    name: Resolve appliance arch list
    runs-on: ubuntu-latest
    outputs:
      arches: ${{ steps.m.outputs.arches }}
    steps:
      - id: m
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ inputs.appliance }}" in
              both) echo 'arches=["i586","i686"]' >> "$GITHUB_OUTPUT" ;;
              none) echo 'arches=[]' >> "$GITHUB_OUTPUT" ;;
              *)    echo 'arches=["${{ inputs.appliance }}"]' >> "$GITHUB_OUTPUT" ;;
            esac
          else
            case "${{ github.ref }}" in
              refs/heads/main|refs/heads/master)
                echo 'arches=["i586","i686"]' >> "$GITHUB_OUTPUT" ;;
              *)
                echo 'arches=[]' >> "$GITHUB_OUTPUT" ;;
            esac
          fi

  build-appliance:
    name: Build Linux appliance (${{ matrix.arch }})
    # A full Buildroot build is ~1 h on a GitHub runner (it compiles its own
    # toolchain from scratch). It runs on a push to main/master (a real release)
    # and on a manual "Run workflow" with the `appliance` input set to
    # i586/i686/both; a push to a feature branch (or appliance=none) skips it.
    # appliance-matrix turns that into the matrix below; an empty list skips
    # this job. i586 = broadest reach (Pentium / 5x86 / Vortex86 / ITX-Llama and
    # up); i686 = a touch faster on Pentium-Pro+ but won't run on a plain
    # Pentium. (A true 486 is cb-dos, built below.)
    needs: [generate-version, appliance-matrix]
    if: needs.appliance-matrix.outputs.arches != '[]'
    runs-on: ubuntu-latest
    # Non-fatal like the MiSTer job — a Buildroot hiccup lets the desktop release
    # ship. Cap the runtime so a wedged build can't burn the 6 h default.
    continue-on-error: true
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJson(needs.appliance-matrix.outputs.arches) }}
    env:
      VER: ${{ needs.generate-version.outputs.version }}
      ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v6

      - name: Free up disk space (Buildroot needs several GB)
        run: |
          # GitHub runners ship ~25 GB of preinstalled SDKs we don't use; drop the
          # big ones so the Buildroot toolchain + image build has room.
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          docker image prune -af || true
          df -h /

      - name: Cache Buildroot source downloads
        uses: actions/cache@v4
        with:
          path: buildroot/dl
          key: buildroot-dl-2024.02
          restore-keys: buildroot-dl-

      - name: Cache Buildroot ccache (${{ matrix.arch }})
        # run_id in the key makes every run save a fresh entry; restore-keys
        # pulls the newest previous one — so the ccache keeps warming up. After
        # the first ~1 h build, warm-cache rebuilds are much faster.
        uses: actions/cache@v4
        with:
          path: buildroot/ccache
          key: buildroot-ccache-${{ matrix.arch }}-${{ github.run_id }}
          restore-keys: buildroot-ccache-${{ matrix.arch }}-

      - name: Build the static i586-musl rb-cli (baked into the appliance)
        # The i586 static binary runs on both i586 and i686 appliances.
        run: |
          docker build -t rb-cross-i586-musl - < docker/cross-i586-musl.Dockerfile
          docker run --rm -v "$PWD":/src rb-cross-i586-musl
          ls -lh target-cross/i586-unknown-linux-musl/release/rb-cli

      - name: Build the Buildroot appliance (${{ matrix.arch }} kernel + rootfs + hybrid ISO)
        run: |
          docker build -t rb-buildroot - < docker/buildroot-appliance.Dockerfile
          docker run --rm -e APPLIANCE_ARCH="${ARCH}" -v "$PWD":/work rb-buildroot
          ls -lh buildroot/output/

      - name: Take ownership of the Buildroot output (Docker writes it root-owned)
        # Buildroot runs as root in the container (-v "$PWD":/work), so everything
        # under buildroot/output/ lands root-owned. The host-side packaging steps
        # below (package-pxe, GRUB floppy, ISO naming) run as the unprivileged
        # runner and must be able to create files there — chown the tree first,
        # else they die with "cp: cannot create ... Permission denied".
        run: sudo chown -R "$(id -u):$(id -g)" buildroot/output

      - name: Install media tooling (PXE initrd extract + GRUB floppy)
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso grub-pc-bin mtools

      - name: Package PXE network-boot bundle
        run: sh buildroot/package-pxe.sh "${ARCH}-${VER}"

      - name: Build GRUB boot floppy (pre-El-Torito BIOS bridge)
        run: |
          sh buildroot/make-grub-floppy.sh
          mv buildroot/output/rusty-backup-grub-floppy.img \
             "buildroot/output/rusty-backup-grub-floppy-${ARCH}-${VER}.img"

      - name: Name the ISO for the release
        # Block scalar (run: |) so the `\` is a real shell line-continuation.
        # As a plain scalar, YAML folds the newline to a space first, leaving
        # bash a `\<space>` (escaped space) that corrupts the destination path.
        run: |
          cp buildroot/output/rusty-backup-appliance.iso \
             "buildroot/output/rusty-backup-appliance-${ARCH}-${VER}.iso"

      - name: Upload appliance artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rusty-backup-appliance-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}
          path: |
            buildroot/output/rusty-backup-appliance-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.iso
            buildroot/output/rusty-backup-appliance-pxe-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.tar.gz
            buildroot/output/rusty-backup-grub-floppy-${{ matrix.arch }}-${{ needs.generate-version.outputs.version }}.img

      - name: Make Buildroot caches readable for actions/cache
        # Buildroot runs as root in the container, so dl/ccache land root-owned;
        # let the runner user read them when the cache@v4 post-step saves.
        if: always()
        run: sudo chmod -R a+rX buildroot/dl buildroot/ccache 2>/dev/null || true

  build-cb-dos:
    name: Build cb-dos media (FreeDOS floppy + CD)
    # Cheap (~2-3 min: DJGPP build + a FreeDOS fetch), so run it on every push
    # like the desktop builds. A manual run can untick "cbdos" to skip it; only
    # `release` (main-only) publishes.
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.cbdos }}
    needs: generate-version
    runs-on: ubuntu-latest
    # Non-fatal like the other deployable-media jobs: a FreeDOS-mirror or DJGPP
    # hiccup shouldn't hold up the desktop release.
    continue-on-error: true
    env:
      VER: ${{ needs.generate-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Build the cb-dos DOS tools (DJGPP cross-compiler)
        run: |
          docker build --platform linux/amd64 -t rb-cb-dos - < docker/cb-dos.Dockerfile
          docker run --rm --platform linux/amd64 -v "$PWD":/src rb-cb-dos
          ls -lh crusty-backup/build/*.exe

      - name: Fetch the FreeDOS 1.4 base floppy
        run: |
          # The FreeDOS 1.4 FloppyEdition is freely redistributable; fetch the
          # 1.44 MB boot floppy in CI rather than vendoring it in the repo.
          curl -fsSL -o /tmp/fd14-floppy.zip \
            https://www.ibiblio.org/pub/micro/pc-stuff/freedos/files/distributions/1.4/FD14-FloppyEdition.zip
          unzip -o -j /tmp/fd14-floppy.zip 144m/x86BOOT.img -d /tmp
          ls -lh /tmp/x86BOOT.img

      - name: Build the cb-dos floppy + CD
        run: FDBASE=/tmp/x86BOOT.img sh crusty-backup/mkmedia.sh

      - name: Name the artifacts for the release
        run: |
          cp crusty-backup/dist/cbdos-freedos.img "crusty-backup/dist/cbdos-freedos-${VER}.img"
          cp crusty-backup/dist/cbdos.iso         "crusty-backup/dist/cbdos-${VER}.iso"

      - name: Upload cb-dos artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cbdos-${{ needs.generate-version.outputs.version }}
          path: |
            crusty-backup/dist/cbdos-freedos-${{ needs.generate-version.outputs.version }}.img
            crusty-backup/dist/cbdos-${{ needs.generate-version.outputs.version }}.iso

  release:
    name: Create Release
    # `!cancelled()` lets this run even when a non-fatal `needs` job is skipped
    # (build-appliance on appliance=none) or fails (continue-on-error appliance/
    # cb-dos/mini-armv7) — those must NOT block the release. The explicit
    # success checks keep the must-have desktop builds strictly required, so a
    # real Windows/macOS/AppImage/packages failure still holds the release.
    if: >-
      !cancelled() &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.build-windows.result == 'success' &&
      needs.build-macos.result == 'success' &&
      needs.build-linux-appimage.result == 'success' &&
      needs.build-linux-packages.result == 'success'
    # The MiSTer armv7 build is in `needs:` so the release waits for its
    # artifact to upload before publishing — combined with
    # `continue-on-error: true` on the build job, a transient armv7 failure
    # is still non-fatal: the release proceeds without the MiSTer artifact
    # rather than being held indefinitely. When the build succeeds the
    # tarball is picked up by the `*.tar.gz` glob below and ships in the
    # release alongside the desktop downloads.
    needs:
      - generate-version
      - build-windows
      - build-macos
      - build-linux-appimage
      - build-linux-packages
      - build-rb-cli-mini-armv7
      # Cross-builds for extra CPU arches: PowerPC BE 32/64 (rb-cli only), plus
      # full GUI + rb-cli for Windows ARM64 and Linux RISC-V 64. continue-on-error
      # like mini-armv7: listed here so the release waits for their tarballs/zips,
      # but a failure can't block the desktop release.
      - build-rb-cli-extra-arch
      - build-windows-arm64
      - build-gui-linux-riscv64
      # build-appliance is skipped on feature branches and on a manual
      # appliance=none run. A skipped `needs` job would normally skip the whole
      # release, so the release `if` below uses `!cancelled()` + explicit
      # success checks on the must-have desktop builds, letting a skipped (or
      # continue-on-error-failed) appliance pass through without blocking.
      - build-appliance
      - build-cb-dos
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      
      - name: Display structure of downloaded files
        run: ls -R artifacts
      
      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          # `rusty-backup.json.zip` matches the *.zip glob; the raw MiSTer
          # Downloader assets (no extension / *.sh) are named explicitly so they
          # ship as standalone, un-versioned release assets the database can hit
          # via `releases/latest/download/`.
          find artifacts -type f \( -name "*.zip" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.AppImage.zsync" -o -name "*.deb" -o -name "*.rpm" -o -name "*.pkg.tar.zst" -o -name "*.exe" -o -name "*.tar.gz" -o -name "*.iso" -o -name "*.img" -o -name "rb-cli-mini-armv7" -o -name "rb-daemon.sh" \) -exec cp {} release-files/ \;
          ls -lh release-files/
      
      # Build a download-picker table from the (fixed) build matrix. Links
      # point at the assets this same job is about to upload. Emitted as the
      # release body; GitHub's auto-generated commit notes are appended below
      # it (generate_release_notes: true).
      - name: Generate downloads table
        env:
          VER: ${{ needs.generate-version.outputs.version }}
        run: |
          TAG="v${VER}"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          # Stable, version-independent URL for the MiSTer Downloader database:
          # the `latest` alias always resolves to the newest non-prerelease, so
          # users add this db_url once and pick up every future build.
          DB_URL="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/rusty-backup.json.zip"
          # Warn (don't fail) if an expected asset is missing — surfaces a
          # matrix change without blocking the release.
          for f in \
            "Rusty-Backup-Setup-windows-x64-${VER}.exe" "Rusty-Backup-windows-x64-${VER}.zip" \
            "Rusty-Backup-Setup-windows-x86-${VER}.exe" "Rusty-Backup-windows-x86-${VER}.zip" \
            "Rusty-Backup-macos-arm64-${VER}.dmg" "Rusty-Backup-macos-x64-${VER}.dmg" \
            "Rusty-Backup-linux-x64-${VER}.AppImage" "Rusty-Backup-linux-x64-${VER}.deb" \
            "Rusty-Backup-linux-x64-${VER}.rpm" "Rusty-Backup-linux-x64-${VER}.pkg.tar.zst" \
            "Rusty-Backup-linux-arm64-${VER}.AppImage" "Rusty-Backup-linux-arm64-${VER}.deb" \
            "Rusty-Backup-linux-arm64-${VER}.rpm" "Rusty-Backup-linux-arm64-${VER}.pkg.tar.zst" \
            "Rusty-Backup-windows-arm64-${VER}.zip" "Rusty-Backup-linux-riscv64-${VER}.tar.gz" \
            "rb-cli-windows-x64-${VER}.zip" "rb-cli-windows-x86-${VER}.zip" \
            "rb-cli-macos-arm64-${VER}.zip" "rb-cli-macos-x64-${VER}.zip" \
            "rb-cli-linux-x64-${VER}.tar.gz" "rb-cli-linux-arm64-${VER}.tar.gz" \
            "rb-cli-mini-armv7-linux-${VER}.tar.gz" \
            "rb-cli-linux-ppc64-${VER}.tar.gz" "rb-cli-linux-ppc32-${VER}.tar.gz" \
            "rb-cli-linux-riscv64-${VER}.tar.gz" "rb-cli-windows-arm64-${VER}.zip" \
            "rb-cli-mini-armv7" "rb-daemon.sh" "rusty-backup.json.zip" \
            "rusty-backup-appliance-i586-${VER}.iso" "rusty-backup-appliance-i686-${VER}.iso" \
            "rusty-backup-appliance-pxe-i586-${VER}.tar.gz" "rusty-backup-appliance-pxe-i686-${VER}.tar.gz" \
            "rusty-backup-grub-floppy-i586-${VER}.img" "rusty-backup-grub-floppy-i686-${VER}.img" \
            "cbdos-freedos-${VER}.img" "cbdos-${VER}.iso"; do
            [ -f "release-files/${f}" ] || echo "::warning::expected release asset missing: ${f}"
          done

          cat > DOWNLOADS.md <<EOF
          ## Downloads

          **Most people want:** Windows -> **x64 installer** · Mac -> **Apple Silicon** or **Intel** \`.dmg\` · Linux -> **x64 AppImage**.

          | Platform | Architecture | App | Command line (\`rb-cli\`) |
          |---|---|---|---|
          | **Windows 11 / 10** | x64 (64-bit) | [Installer](${BASE}/Rusty-Backup-Setup-windows-x64-${VER}.exe) · [Portable zip](${BASE}/Rusty-Backup-windows-x64-${VER}.zip) | [rb-cli](${BASE}/rb-cli-windows-x64-${VER}.zip) |
          | **Windows 10** | x86 (32-bit) | [Installer](${BASE}/Rusty-Backup-Setup-windows-x86-${VER}.exe) · [Portable zip](${BASE}/Rusty-Backup-windows-x86-${VER}.zip) | [rb-cli](${BASE}/rb-cli-windows-x86-${VER}.zip) |
          | **Windows 11** | ARM64 (AArch64) | [Portable zip](${BASE}/Rusty-Backup-windows-arm64-${VER}.zip) | [rb-cli](${BASE}/rb-cli-windows-arm64-${VER}.zip) |
          | **macOS 10.13+** | Apple Silicon (arm64) | [.dmg](${BASE}/Rusty-Backup-macos-arm64-${VER}.dmg) | [rb-cli](${BASE}/rb-cli-macos-arm64-${VER}.zip) |
          | **macOS 10.13+** | Intel (x64) | [.dmg](${BASE}/Rusty-Backup-macos-x64-${VER}.dmg) | [rb-cli](${BASE}/rb-cli-macos-x64-${VER}.zip) |
          | **Linux** (glibc >= 2.39) | x64 | [AppImage](${BASE}/Rusty-Backup-linux-x64-${VER}.AppImage) · [deb](${BASE}/Rusty-Backup-linux-x64-${VER}.deb) · [rpm](${BASE}/Rusty-Backup-linux-x64-${VER}.rpm) · [pkg](${BASE}/Rusty-Backup-linux-x64-${VER}.pkg.tar.zst) | [rb-cli](${BASE}/rb-cli-linux-x64-${VER}.tar.gz) |
          | **Linux** (glibc >= 2.39) | arm64 | [AppImage](${BASE}/Rusty-Backup-linux-arm64-${VER}.AppImage) · [deb](${BASE}/Rusty-Backup-linux-arm64-${VER}.deb) · [rpm](${BASE}/Rusty-Backup-linux-arm64-${VER}.rpm) · [pkg](${BASE}/Rusty-Backup-linux-arm64-${VER}.pkg.tar.zst) | [rb-cli](${BASE}/rb-cli-linux-arm64-${VER}.tar.gz) |
          | **Linux** (glibc >= 2.39) | RISC-V 64-bit (\`riscv64gc\`) | [tar.gz](${BASE}/Rusty-Backup-linux-riscv64-${VER}.tar.gz) | [rb-cli](${BASE}/rb-cli-linux-riscv64-${VER}.tar.gz) |
          | **MiSTer FPGA** (Cortex-A9, glibc 2.31) | armv7 hardfloat | _(GUI not built for this target)_ | [rb-cli-mini](${BASE}/rb-cli-mini-armv7-linux-${VER}.tar.gz) |

          <sub>**Windows:** x86 = 32-bit (Windows 10, the last Windows with 32-bit support). · **macOS:** requires 10.13 High Sierra or later. · **Linux:** deb = Debian/Ubuntu, rpm = Fedora/RHEL/openSUSE, pkg = Arch/Manjaro; the packages and \`rb-cli\` are built against **glibc 2.39** (Ubuntu 24.04), while the **AppImage** is self-contained and runs on most distributions regardless of glibc. · **Windows ARM64 / RISC-V 64:** cross-compiled, build-only legs — the Windows ARM64 app is a portable zip and the RISC-V 64 app is a plain dynamically-linked tarball that uses your system GTK3 (not a self-contained AppImage like x64/arm64). · **MiSTer FPGA:** \`rb-cli-mini\` is a slim \`rb-cli\` cross-compiled for the MiSTer's armv7 hardfloat Intel Cyclone V SoC against Ubuntu 20.04 glibc 2.31 — same baseline as the MiSTer Buildroot rootfs and the upstream \`libchdman-rs\` armv7 prebuilt. GUI/optical features are off; CHD is in. Drop it onto the SD at \`/media/fat/Scripts/rb-cli\`. · Every **rb-cli** download contains a single \`rb-cli\` executable (\`rb-cli.exe\` on Windows).</sub>

          ### Command-line (\`rb-cli\`) for other CPU architectures

          No desktop GUI on these — they ship the headless **\`rb-cli\` only**, built from the all-pure-Rust slim feature set (no CHD/optical; \`.zst\` / \`.raw\` / \`.vhd\` / \`.img\` and every filesystem still work). Big-endian PowerPC is fully supported — the on-disk parsers use explicit endianness throughout, so a G5 or G4 reads the same images as an x64 box.

          | Platform | Architecture | Command line (\`rb-cli\`) |
          |---|---|---|
          | **Linux** (glibc >= 2.39) | PowerPC 64-bit, big-endian (G5 / POWER) | [rb-cli](${BASE}/rb-cli-linux-ppc64-${VER}.tar.gz) |
          | **Linux** (glibc >= 2.39) | PowerPC 32-bit, big-endian (G3 / G4) | [rb-cli](${BASE}/rb-cli-linux-ppc32-${VER}.tar.gz) |

          <sub>These PowerPC builds use the same **glibc 2.39** (Ubuntu 24.04) baseline as the x64/arm64 \`rb-cli\`, and each download contains a single \`rb-cli\` executable. (Windows ARM64 and RISC-V 64 now ship a full desktop app — see the main table above.)</sub>

          ### Install on a MiSTer FPGA (one line, auto-updating)

          MiSTer users don't need the tarball: add Rusty Backup to the **MiSTer Downloader** as a custom database and it installs (and keeps itself updated) from the Scripts/Update menu. Add this section to \`/media/fat/downloader.ini\` on the SD card:

          \`\`\`ini
          [danifunker/rusty-backup]
          db_url = '${DB_URL}'
          \`\`\`

          Then run **Scripts > update** (or **Downloader**) on the MiSTer. It drops \`rb-cli\` and \`rb-daemon.sh\` into \`/media/fat/Scripts\`. Open **rb-daemon** from the Scripts menu to start the network daemon and enable it on boot. The \`db_url\` points at the \`latest\` release, so each future Downloader run picks up new builds automatically. (Prefer to do it by hand? The \`rb-cli-mini-...tar.gz\` above still works via its bundled \`install.sh\`.)

          ### Boot the vintage machine itself (Linux appliance)

          For 486/Pentium-class boxes too old to run the desktop app — boot the rusty-backup backup/restore menu straight on the metal (VGA monitor or serial console), with a broad vintage NIC / SCSI / IDE driver set baked in.

          Pick **i586** unless you know your box is a Pentium Pro or newer: i586 runs on i586 *and* i686 (Pentium / MMX / K6 / Cyrix / 5x86 / Vortex86-ITX-Llama and up); i686 is a touch faster but needs a Pentium-Pro-class CPU. A true 486 uses **cb-dos**.

          | Artifact | Boots from | Notes |
          |---|---|---|
          | **Appliance ISO** — [i586](${BASE}/rusty-backup-appliance-i586-${VER}.iso) · [i686](${BASE}/rusty-backup-appliance-i686-${VER}.iso) | CD-ROM **or** USB / CF (\`dd\` the same file on) | The workhorse hybrid image. |
          | **PXE bundle** — [i586](${BASE}/rusty-backup-appliance-pxe-i586-${VER}.tar.gz) · [i686](${BASE}/rusty-backup-appliance-pxe-i686-${VER}.tar.gz) | the network (TFTP / PXE) | A diskless backup *station*. |
          | **GRUB boot floppy** — [i586](${BASE}/rusty-backup-grub-floppy-i586-${VER}.img) · [i686](${BASE}/rusty-backup-grub-floppy-i686-${VER}.img) | a floppy that then loads the appliance off the CD | For pre-El-Torito BIOSes that can't boot a CD directly. |
          | **cb-dos** ([floppy](${BASE}/cbdos-freedos-${VER}.img) · [CD](${BASE}/cbdos-${VER}.iso)) | a FreeDOS floppy or CD | The DOS-native lane (no Linux) for a true 486, or any box where even a minimal Linux is too heavy. |

          <sub>Which cards work and how to add more: [\`docs/appliance_hardware_support.md\`](https://github.com/${GITHUB_REPOSITORY}/blob/main/docs/appliance_hardware_support.md). cb-dos background: [\`docs/cb_dos.md\`](https://github.com/${GITHUB_REPOSITORY}/blob/main/docs/cb_dos.md).</sub>

          ---
          EOF
          echo "----- generated DOWNLOADS.md -----"
          cat DOWNLOADS.md

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.generate-version.outputs.version }}
          name: Release ${{ needs.generate-version.outputs.version }}
          files: release-files/*
          body_path: DOWNLOADS.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
