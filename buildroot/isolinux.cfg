# rusty-backup appliance — ISOLINUX boot config.
#
# This replaces Buildroot's stock fs/iso9660/isolinux.cfg (wired in via
# BR2_TARGET_ROOTFS_ISO9660_BOOT_MENU in build.sh). The only substantive change
# over the stock template is a *serial console*:
#
#   serial 0 115200                         -> ISOLINUX echoes to COM1 as well
#                                              as the VGA screen
#   ... console=tty0 console=ttyS0,115200   -> the kernel logs to BOTH the VGA
#                                              monitor and COM1
#
# Why: without a serial console the appliance can only be watched on a monitor,
# so a headless boot (qemu -nographic, a real serial terminal, CI) shows nothing
# and looks hung. With it, the whole boot — bootloader through the rb-cli menu —
# is visible and drivable over the serial line, while a VGA monitor still works
# for real hardware. (NB: qemu's `-vga std` emulation stops repainting partway
# through the kernel's boot and makes the boot *look* frozen even though it isn't
# — use `-vga cirrus` or the serial console to watch a qemu boot.)
#
# Buildroot substitutes __KERNEL_PATH__ / __INITRD_PATH__ at image-build time
# (the initrd line is dropped automatically when no external initrd is used).
serial 0 115200
default rusty-backup
prompt 0
timeout 1
label rusty-backup
      kernel __KERNEL_PATH__
      initrd __INITRD_PATH__
      append root=/dev/sr0 console=tty0 console=ttyS0,115200
